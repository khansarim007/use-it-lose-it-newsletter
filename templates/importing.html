{% extends 'base.html' %}
{% block content %}
<section class="max-w-3xl mx-auto">
  <div class="rounded-[2rem] border border-slate-200 bg-white p-8 sm:p-10 shadow-sm text-center reveal">
    <span class="inline-flex items-center px-3 py-1 rounded-full bg-sky-100 text-sky-700 text-sm font-semibold">Step 2 of 3</span>
    <h1 class="mt-4 text-4xl font-black tracking-tight text-slate-950">Preparing your report</h1>
    <p id="phase-text" class="mt-4 text-lg text-slate-700">Connecting to your account...</p>

    <div class="mt-6 h-2 rounded-full bg-slate-200 overflow-hidden" aria-hidden="true">
      <div id="progress-bar" class="h-full bg-slate-950 transition-all duration-700" style="width: 12%"></div>
    </div>

    <p class="mt-6 text-sm text-slate-500">This usually takes less than a minute.</p>
  </div>
</section>

<script>
  (function () {
    const phases = [
      { text: "Connecting to your account...", progress: 32 },
      { text: "Importing subscribers...", progress: 66 },
      { text: "Analyzing engagement...", progress: 92 },
    ];

    const textEl = document.getElementById("phase-text");
    const progressEl = document.getElementById("progress-bar");
    const nextUrl = {{ next_url|tojson }};
    let index = 0;

    function tick() {
      if (index >= phases.length) {
        progressEl.style.width = "100%";
        window.location.href = nextUrl;
        return;
      }
      textEl.textContent = phases[index].text;
      progressEl.style.width = phases[index].progress + "%";
      index += 1;
      setTimeout(tick, 900);
    }

    setTimeout(tick, 400);
  })();
</script>
{% endblock %}
