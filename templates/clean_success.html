{% extends 'base.html' %}
{% block content %}
<section class="max-w-3xl mx-auto">
  <div class="rounded-[2rem] border border-emerald-200 bg-white p-8 sm:p-10 text-center shadow-sm reveal">
    <span class="inline-flex items-center px-3 py-1 rounded-full bg-emerald-100 text-emerald-700 text-sm font-semibold">Success</span>
    <h1 class="mt-4 text-4xl font-black tracking-tight text-slate-950">List cleaned successfully</h1>
    <p class="mt-3 text-lg text-slate-700">Removed {{ removed }} inactive subscribers. Your list now has {{ remaining_active }} active subscribers.</p>
    <a href="{{ url_for('dashboard') }}" class="btn-action btn-action-primary mt-6">View updated report</a>
  </div>
</section>
{% endblock %}
