{% extends 'base.html' %}
{% block content %}
<div class="max-w-xl mx-auto bg-white rounded-3xl border border-slate-200 shadow-sm p-6 sm:p-8">
  <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-emerald-50 text-emerald-700 text-sm font-semibold mb-4">Platform connection</div>
  <h1 class="text-3xl font-black tracking-tight text-slate-950">{{ title }}</h1>
  <p class="mt-3 text-slate-600">{{ description }}</p>

  <form method="POST" class="space-y-5 mt-8">
    <div>
      <label class="block text-sm font-medium mb-2 text-slate-700">{{ field_label }}</label>
      <input type="text" name="api_key" placeholder="{{ placeholder }}" required class="w-full rounded-xl border border-slate-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500" />
    </div>
    <button type="submit" class="w-full rounded-full bg-slate-950 text-white font-semibold py-3 shadow-lg shadow-slate-950/20 hover:bg-slate-800 transition-colors">
      Connect {{ platform_label }}
    </button>
  </form>
</div>
{% endblock %}
