{% extends "base.html" %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <section class="surface-card p-6 sm:p-8 reveal">
        <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-emerald-50 text-emerald-700 text-sm font-semibold mb-4">
            Integration setup
        </div>
        <h1 class="text-3xl font-black tracking-tight text-slate-950">{{ title }}</h1>
        <p class="mt-2 text-slate-600">{{ description }}</p>

        {% if options %}
            <form method="POST" class="space-y-5 mt-6">
                <div>
                    <label for="selected_id" class="block text-sm font-medium text-slate-700 mb-2">
                        {{ source_label }} {{ source_type_label|capitalize }}
                    </label>
                    <select id="selected_id" name="{{ source_type_label }}_id" required class="input-premium">
                        <option value="">-- Select a {{ source_type_label }} --</option>
                        {% for option in options %}
                            {% set option_value = option.get(option_value_key) %}
                            {% set option_label = option.get(option_label_key) %}
                            {% set option_detail = option.get(option_detail_key) %}
                            <option value="{{ option_value }}">
                                {{ option_label }}{% if option_detail %} ({{ option_detail }}){% endif %}
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <button type="submit" class="btn-action btn-action-primary w-full">
                    {{ submit_label }}
                </button>
            </form>

            <p class="text-xs text-slate-500 mt-5">
                You can change this source later by reconnecting the integration.
            </p>
        {% else %}
            <div class="rounded-2xl border border-amber-200 bg-amber-50 p-4 text-amber-900 mt-6">
                <p>{{ empty_message }}</p>
            </div>

            <a href="{{ url_for('dashboard') }}" class="btn-action btn-action-accent w-full mt-4">
                Back to dashboard
            </a>
        {% endif %}
    </section>
</div>
{% endblock %}
