{% extends 'base.html' %}
{% block content %}
<div class="max-w-2xl bg-white rounded-xl shadow-sm p-6">
  <h1 class="text-2xl font-semibold mb-2">Upload Subscribers CSV</h1>
  <p class="text-slate-600 mb-4">Upload a CSV with one column: email</p>

  <form method="POST" enctype="multipart/form-data" class="space-y-4">
    <input type="file" name="csv_file" accept=".csv" required class="block w-full border border-slate-300 rounded p-2" />
    <button type="submit" class="px-4 py-2 rounded bg-slate-900 text-white">Upload</button>
  </form>

  <div class="mt-6 p-4 rounded bg-slate-100 text-sm">
    <p class="font-medium">CSV example</p>
    <pre class="mt-2">email
alice@example.com
bob@example.com</pre>
  </div>
</div>
{% endblock %}
